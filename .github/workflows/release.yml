name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  # Gate: ensure CI passes before releasing
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          KENSA_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          SHIM_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('packages/kensa-mcp/pyproject.toml','rb'))['project']['version'])")
          SHIM_PIN=$(grep -oE 'kensa\[mcp\]==[0-9][^"]*' packages/kensa-mcp/pyproject.toml | sed 's/.*==//')
          fail=0
          for pair in "kensa:$KENSA_VERSION" "kensa-mcp:$SHIM_VERSION" "shim-pin:$SHIM_PIN"; do
            name="${pair%%:*}"; got="${pair#*:}"
            if [ "$TAG_VERSION" != "$got" ]; then
              echo "::error::Tag version ($TAG_VERSION) does not match $name version ($got)"
              fail=1
            fi
          done
          [ "$fail" = "0" ]

      - name: Build kensa sdist and wheel
        run: uv build

      - name: Build kensa-mcp shim sdist and wheel
        run: |
          cd packages/kensa-mcp
          uv build
          cp dist/* ../../dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
