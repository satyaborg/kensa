name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'website/**'
      - '**.md'
      - 'assets/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'website/**'
      - '**.md'
      - 'assets/**'
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Test
        run: uv run --python ${{ matrix.python-version }} pytest -m "not integration" --cov=kensa --cov-report=term-missing --cov-fail-under=90

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run ty check
