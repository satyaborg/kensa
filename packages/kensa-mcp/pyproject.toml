[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kensa-mcp"
version = "0.4.0"
description = "MCP server for kensa, the open source agent evals harness"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{name = "satyaborg", email = "satya.borg@gmail.com"}]
keywords = ["evals", "llm", "agents", "mcp", "model-context-protocol", "testing", "ai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "kensa[mcp]==0.4.0",
]

[project.urls]
Homepage = "https://kensa.sh/docs/mcp"
Repository = "https://github.com/satyaborg/kensa"
Issues = "https://github.com/satyaborg/kensa/issues"

[project.scripts]
kensa-mcp = "kensa_mcp:main"

[tool.hatch.build.targets.wheel]
packages = ["src/kensa_mcp"]

[tool.hatch.build.targets.sdist]
only-include = [
    "src/kensa_mcp",
    "pyproject.toml",
    "README.md",
]
