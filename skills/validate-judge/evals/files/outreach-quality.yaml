criterion: Outreach message follows ICP rules

pass: |
  Message meets all ICP outreach rules:
  - References something specific about the lead (company, role, recent activity)
  - Leads with the prospect's problem, not the product
  - Contains exactly one clear CTA
  - Three sentences or fewer
  - No fabricated claims or hallucinated details

fail: |
  Message violates one or more ICP rules:
  - Generic opening with no lead-specific reference
  - Leads with product pitch instead of prospect's problem
  - Multiple CTAs or no CTA
  - More than three sentences
  - Contains fabricated claims about the lead

examples:
  - output: "Hi Alex — saw your HN post about evaluating observability vendors. If latency debugging is eating your team's time, our tracing SDK drops in with zero config. Want a 10-min demo?"
    label: pass
    critique: "References specific HN post, leads with their problem (latency debugging), one CTA (demo), 3 sentences, no fabrication."
  - output: "Hey! We're the best observability platform on the market. We have amazing features and great pricing. You should definitely check us out. Book a demo today! Also follow us on Twitter!"
    label: fail
    critique: "No lead-specific reference, leads with product pitch, two CTAs (demo + Twitter), 5 sentences, vague claims."
  - output: "Hi Alex — your team at DataFlow is growing fast. Observability gets harder at scale. Want to chat about how we can help?"
    label: pass
    critique: "Borderline — references company name (minimal specificity), leads with their scaling problem, one CTA, 3 sentences. Passes but barely."
